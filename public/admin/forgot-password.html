<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ff6600, #ff944d);
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 380px;
      text-align: center;
    }
    h2 {margin-bottom: 15px;}
    p {font-size: 14px; color: #f8f8f8; margin-bottom: 25px;}
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group i {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      color: #fff;
      opacity: 0.7;
    }
    input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    input::placeholder {color: rgba(255, 255, 255, 0.6);}
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: #ff6600;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {background: #ffe5d0;}
    #msg {
      margin-top: 15px;
      font-size: 14px;
      height: 20px;
    }
    a {
      color: #fff;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }
    a:hover {text-decoration: underline;}
  </style>
</head>
<body>
  <div class="card">
    <i class="fas fa-key" style="font-size: 40px; margin-bottom: 10px; color:#fff;"></i>
    <h2>Forgot Password?</h2>
    <p>Enter your registered admin email and we'll send you a reset link.</p>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <button id="sendBtn">Send Reset Link</button>
    <p id="msg"></p>
    <a href="login.html">← Back to Login</a>
  </div>

  <script>
    const API_URL = "/api/admin/forgot-password";
    document.getElementById("sendBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      if (!email) return msg.textContent = "Please enter your email.";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msg.style.color = res.ok ? "#00ff88" : "pink";
        msg.textContent = data.msg || "Something went wrong.";
      } catch (err) {
        msg.style.color = "pink";
        msg.textContent = "Server error. Try again later.";
      }
    });
  </script>
</body>
</html>
