<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Pratap Car Rental</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e272e, #34495e);
      font-family: 'Poppins', sans-serif;
      color: #ecf0f1;
      overflow: hidden;
      position: relative;
    }

    /* Background animation */
    .background-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      animation: animate 25s linear infinite;
      bottom: -150px;
    }

    .background-animation span:nth-child(1) {left: 25%; width: 80px; height: 80px; animation-delay: 0s;}
    .background-animation span:nth-child(2) {left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s;}
    .background-animation span:nth-child(3) {left: 70%; width: 20px; height: 20px; animation-delay: 4s;}
    .background-animation span:nth-child(4) {left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s;}
    .background-animation span:nth-child(5) {left: 65%; width: 20px; height: 20px; animation-delay: 0s;}
    .background-animation span:nth-child(6) {left: 75%; width: 110px; height: 110px; animation-delay: 3s;}
    .background-animation span:nth-child(7) {left: 35%; width: 150px; height: 150px; animation-delay: 7s;}
    .background-animation span:nth-child(8) {left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s;}
    .background-animation span:nth-child(9) {left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s;}
    .background-animation span:nth-child(10) {left: 85%; width: 150px; height: 150px; animation-delay: 11s;}

    @keyframes animate {
      0% {transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0;}
      100% {transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%;}
    }

    /* Glassmorphism Card */
    .login-card {
      position: relative;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      text-align: center;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .car-icon {font-size: 50px; color: #00bcd4; margin-bottom: 15px; text-shadow: 0 0 12px rgba(0, 188, 212, 0.5);}
    .login-card h2 {color: #fff; margin-bottom: 10px; font-weight: 600;}
    .tagline {font-size: 13px; color: #ccc; margin-bottom: 25px;}

    .input-group {
      position: relative;
      margin-bottom: 22px;
    }
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.6);
    }
    .input-group input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 15px;
      transition: 0.3s;
    }
    .input-group input::placeholder {color: rgba(255,255,255,0.5);}
    .input-group input:focus {
      border-color: #00bcd4;
      box-shadow: 0 0 12px rgba(0,188,212,0.4);
      background: rgba(255,255,255,0.15);
    }

    /* Checkbox & Forgot */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 20px;
      color: #ccc;
    }
    .options label {cursor: pointer;}
    .options a {color: #00bcd4; text-decoration: none;}
    .options a:hover {text-decoration: underline;}

    /* Button */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #00bcd4, #0097a7);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,188,212,0.4);
    }
    .login-btn:hover {transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,188,212,0.6);}
    .login-btn:active {transform: translateY(0); box-shadow: 0 2px 10px rgba(0,188,212,0.3);}

    /* Loader */
    .loader {
      display: none;
      margin: 10px auto;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #00bcd4;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {100% {transform: rotate(360deg);} }

    #error {color: #ff6b6b; font-size: 14px; margin-top: 10px; height: 18px;}
  </style>
</head>
<body>
  <div class="background-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="login-card">
    <div class="car-icon"><i class="fas fa-car"></i></div>
    <h2>Admin Login</h2>
    <p class="tagline">Access your Pratap Car Rental Dashboard</p>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="Admin Email" required />
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Password" required />
    </div>

    <div class="options">
      <label><input type="checkbox" id="rememberMe" /> Remember Me</label>
      <a href="forgot-password.html">Forgot Password?</a>
    </div>

    <button class="login-btn" id="loginBtn">Login</button>
    <div class="loader" id="loader"></div>
    <p id="error"></p>
  </div>

  <script>
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error");
      const loader = document.getElementById("loader");
      error.innerText = "";

      // Email & password validation
      if (!email || !password) return error.innerText = "Please fill in all fields.";
      if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) return error.innerText = "Invalid email format.";
      if (password.length < 6) return error.innerText = "Password must be at least 6 characters.";

      loader.style.display = "block";

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          if (document.getElementById("rememberMe").checked) {
            localStorage.setItem("adminEmail", email);
          }
          window.location.href = "/admin/index.html";
        } else {
          error.innerText = data.msg || "Invalid credentials.";
        }
      } catch (err) {
        console.error("Login error:", err);
        error.innerText = "Server error. Please try again later.";
      } finally {
        loader.style.display = "none";
      }
    });

    // Auto-fill saved admin email
    window.onload = () => {
      const savedEmail = localStorage.getItem("adminEmail");
      if (savedEmail) document.getElementById("email").value = savedEmail;
    };
  </script>
</body>
</html>
