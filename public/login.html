<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Login | PRATAPCARRENTAL</title>

  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #ff6600, #ff9966);
      overflow: hidden;
      position: relative;
    }

    /* 🔹 Floating background shapes */
    .background-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.15);
      animation: animate 25s linear infinite;
      bottom: -150px;
      border-radius: 50%;
    }

    .background-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .background-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
    .background-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
    .background-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
    .background-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
    .background-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
    .background-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
    .background-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
    .background-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
    .background-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 11s; }

    @keyframes animate {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
    }

    /* 🔸 Glass Login Box */
    .login-card {
      position: relative;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      z-index: 1;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .car-icon {
      font-size: 45px;
      color: #ffffff;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
    }

    .login-card h2 {
      margin-bottom: 8px;
      font-weight: 600;
      color: #fff;
    }

    .login-card p {
      font-size: 14px;
      color: #f1f1f1;
      margin-bottom: 25px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.7);
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #ff6600, #ff9966);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 102, 0, 0.6);
    }

    .login-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(255, 102, 0, 0.3);
    }

    .extra-links {
      margin-top: 20px;
      font-size: 14px;
    }

    .extra-links a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    #error {
      color: #ff4747;
      font-size: 14px;
      margin-top: 10px;
      height: 18px;
    }

    footer {
      position: absolute;
      bottom: 10px;
      text-align: center;
      color: #fff;
      font-size: 14px;
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px;
        width: 90%;
      }
      .car-icon { font-size: 35px; }
    }
  </style>
</head>

<body>
  <div class="background-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="login-card">
    <div class="car-icon"><i class="fas fa-car-side"></i></div>
    <h2>Welcome Back!</h2>
    <p>Login to continue your ride with PRATAPCARRENTAL</p>

    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email" required />
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required />
      </div>

      <button type="submit" class="login-btn">Login</button>
      <p id="error"></p>

      <div class="extra-links">
        <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
        <p><a href="forgot-password.html">Forgot Password?</a></p>
      </div>
    </form>
  </div>

  <footer>
    © <script>document.write(new Date().getFullYear());</script> PRATAPCARRENTAL. All Rights Reserved.
  </footer>

  <script>
    const API_URL = "https://pratap-car-rental-fusz.onrender.com/api/auth/login";
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error");
      error.innerText = "";

      if (!email || !password) {
        error.innerText = "Please fill in all fields.";
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem("token", data.token);
          alert("✅ Login successful!");
          window.location.href = "index.html";
        } else {
          error.innerText = data.msg || "Invalid credentials.";
        }
      } catch (err) {
        console.error("Login failed:", err);
        error.innerText = "Server error. Please try again later.";
      }
    });
  </script>
</body>
</html>
